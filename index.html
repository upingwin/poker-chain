<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Poker Chain</title>
  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══ LEVEL SELECT ══ -->
  <div id="screen-select">

    <div id="select-top">
      <div id="select-title">Poker Chain</div>
      <div id="select-top-right">
        <div id="select-stars-badge" class="hidden">
          <span id="stars-owned">0</span>
          <span class="star-icon">⭐</span>
        </div>
        <button id="btn-trophy" onclick="openGlobalLeaderboard()" aria-label="Leaderboard">🏆</button>
      </div>
    </div>

    <!-- Chapter tabs -->
    <div id="chapter-tabs"></div>

    <!-- Level grid for active chapter -->
    <div id="level-panel">
      <div id="level-grid"></div>
    </div>

    <div id="select-rule">Suit · Rank · Straight · Master cards to power up</div>

  </div>

  <!-- ══ GAME SCREEN ══ -->
  <div id="screen-game" class="hidden">

    <!-- Row 1: nav + level info + timer + mute -->
    <div id="header">
      <button id="btn-back" onclick="goBack()" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M12 5L7 10L12 15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div id="level-info">
        <div id="level-label"></div>
        <div id="level-name"></div>
      </div>

      <div id="timer-wrap">
        <div id="timer-ring">
          <svg id="timer-svg" viewBox="0 0 44 44">
            <circle id="timer-bg-ring"  cx="22" cy="22" r="18" />
            <circle id="timer-arc"      cx="22" cy="22" r="18" />
          </svg>
          <span id="timer-value">3:00</span>
        </div>
      </div>

      <button id="btn-mute" onclick="toggleMute()" aria-label="Mute">
        <svg id="icon-sound" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 6.5H6L10 3V15L6 11.5H3V6.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M13 6C13.8 7 14.2 8 14.2 9C14.2 10 13.8 11 13 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <svg id="icon-mute" width="18" height="18" viewBox="0 0 18 18" fill="none" class="hidden">
          <path d="M3 6.5H6L10 3V15L6 11.5H3V6.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M13 7L16 11M16 7L13 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Row 2: score / progress / target -->
    <div id="progress-row">
      <span id="score-value">0</span>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <span id="target-value">0</span>
    </div>

    <!-- Board -->
    <div id="board-container">
      <div id="board"></div>
      <svg id="connection-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="ink-blur">
            <feGaussianBlur stdDeviation="1.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <polyline id="connection-line" points=""/>
      </svg>
    </div>

    <!-- Tools row -->
    <div id="tools-row">
      <button class="tool-btn" id="btn-undo" onclick="useTool('undo')">
        <span class="tool-icon">↩</span>
        <span class="tool-label">Undo</span>
        <span class="tool-count" id="undo-count"></span>
      </button>
      <button class="tool-btn" id="btn-timecard" onclick="useTool('timecard')">
        <span class="tool-icon">⏱</span>
        <span class="tool-label">+60s</span>
        <span class="tool-count" id="timecard-count"></span>
      </button>
      <button class="tool-btn" id="btn-shuffle" onclick="useTool('shuffle')">
        <span class="tool-icon">⇌</span>
        <span class="tool-label">Shuffle</span>
        <span class="tool-count" id="shuffle-count"></span>
      </button>
    </div>

  </div>

  <!-- ══ WIN / LOSE OVERLAY ══ -->
  <div id="overlay" class="hidden">
    <div id="overlay-box">
      <div id="overlay-emoji"></div>
      <div id="overlay-title"></div>
      <div id="overlay-sub"></div>
      <div id="win-rank" class="hidden"></div>
      <div id="stars-row"></div>
      <div id="overlay-btns"></div>
    </div>
  </div>

  <!-- ══ LEADERBOARD MODAL ══ -->
  <div id="lb-modal" class="hidden">
    <div id="lb-box">
      <div id="lb-header">
        <div id="lb-tabs">
          <button id="lb-tab-level"  class="lb-tab active" onclick="switchLbTab('level')">This Level</button>
          <button id="lb-tab-global" class="lb-tab"        onclick="switchLbTab('global')">Global</button>
        </div>
        <button id="lb-close" onclick="closeLeaderboard()">✕</button>
      </div>
      <div id="lb-loading">Loading…</div>
      <div id="lb-list"></div>
      <div id="lb-my-rank" class="hidden"></div>
    </div>
  </div>

  <!-- ══ STARS PAYMENT MODAL ══ -->
  <div id="stars-modal" class="hidden">
    <div id="stars-box">
      <div id="sm-icon"></div>
      <div id="sm-title"></div>
      <div id="sm-desc"></div>
      <div id="sm-price">
        <span id="sm-stars-amount"></span>
        <span class="star-icon">⭐</span>
        <span id="sm-label">Telegram Stars</span>
      </div>
      <div id="sm-btns">
        <button class="ov-btn primary" id="sm-pay-btn" onclick="payWithStars()">
          Pay with Stars ⭐
        </button>
        <button class="ov-btn secondary" onclick="closeStarsModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
